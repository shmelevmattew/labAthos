kafka_version: "3.8.1"
kafka_scala_version: "2.13"
kafka_download_url: "https://downloads.apache.org/kafka/{{ kafka_version }}/kafka_{{ kafka_scala_version }}-{{ kafka_version }}.tgz"

kafka_install_dir: /opt/kafka
kafka_config_dir: /etc/kafka
kafka_log_dir: /var/lib/kafka
kafka_user: kafka
kafka_group: kafka

# KRaft single-node lab cluster (fixed UUID — idempotent format)
kafka_cluster_id: "4L6g3nShT-eMCtK--X86sw"
kafka_node_id: 1

kafka_broker_host: kafka.lab.local
kafka_listen_address: "0.0.0.0"
kafka_broker_port: 9092
kafka_controller_port: 9093

kafka_heap_opts: "-Xms512m -Xmx1g"
kafka_log_retention_hours: 168

kafka_topics:
  - name: bank.transactions.created
    partitions: 3
    replication_factor: 1
  - name: bank.accounts.events
    partitions: 3
    replication_factor: 1
