---
- name: Install packages for DNS role
  ansible.builtin.apt:
    name:
      - dnsutils
      - libcap2-bin
    state: present
    update_cache: true
  tags: [dns, packages]

- name: Create coredns system group
  ansible.builtin.group:
    name: "{{ coredns_group }}"
    system: true
  tags: [dns]

- name: Create coredns system user
  ansible.builtin.user:
    name: "{{ coredns_user }}"
    group: "{{ coredns_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  tags: [dns]

- name: Create CoreDNS config directory
  ansible.builtin.file:
    path: "{{ coredns_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [dns]

- name: Download CoreDNS archive
  ansible.builtin.get_url:
    url: "https://github.com/coredns/coredns/releases/download/v{{ coredns_version }}/coredns_{{ coredns_version }}_linux_amd64.tgz"
    dest: "/tmp/coredns_{{ coredns_version }}_linux_amd64.tgz"
    mode: "0644"
  tags: [dns]

- name: Install CoreDNS binary
  ansible.builtin.unarchive:
    src: "/tmp/coredns_{{ coredns_version }}_linux_amd64.tgz"
    dest: /usr/local/bin
    remote_src: true
    include: coredns
    mode: "0755"
    owner: root
    group: root
  notify: Restart coredns
  tags: [dns]

- name: Allow CoreDNS to bind port 53
  ansible.builtin.command: "setcap cap_net_bind_service=+ep {{ coredns_binary_path }}"
  register: coredns_setcap
  changed_when: coredns_setcap.rc == 0
  tags: [dns]

- name: Deploy lab zone hosts file
  ansible.builtin.template:
    src: lab.local.hosts.j2
    dest: "{{ coredns_config_dir }}/{{ lab_domain }}.hosts"
    owner: "{{ coredns_user }}"
    group: "{{ coredns_group }}"
    mode: "0644"
  notify: Restart coredns
  tags: [dns]

- name: Deploy CoreDNS config
  ansible.builtin.template:
    src: Corefile.j2
    dest: "{{ coredns_config_dir }}/Corefile"
    owner: root
    group: root
    mode: "0644"
  notify: Restart coredns
  tags: [dns]

- name: Deploy CoreDNS systemd unit
  ansible.builtin.template:
    src: coredns.service.j2
    dest: /etc/systemd/system/coredns.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart coredns
  tags: [dns]

- name: Enable and start CoreDNS
  ansible.builtin.systemd:
    name: coredns
    enabled: true
    state: started
    daemon_reload: true
  tags: [dns]
